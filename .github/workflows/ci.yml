name: CI

on:
  push:
    branches:
      - dev
      - pre-prod
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - dev
      - pre-prod
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Type-check / Build
    runs-on: ubuntu-latest
    env:
      # Actions JS runtime (checkout/setup-node) — align with Node 24 before default switch
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
